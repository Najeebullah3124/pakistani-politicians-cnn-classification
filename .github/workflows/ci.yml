name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Syntax (compileall)
        run: python -m compileall -q app

      - name: Ruff
        run: pip install ruff && ruff check app

      - name: Install test dependencies
        run: pip install pytest httpx fastapi uvicorn python-multipart Pillow numpy

      - name: Pytest
        run: pytest tests/test_api.py -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Placeholder model for image build
        run: printf 'ci-placeholder-not-a-real-model' > resnet_final.keras

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile
          push: false
          tags: pakistani-politicians-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
