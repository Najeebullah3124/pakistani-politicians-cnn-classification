<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakistani Politician Classifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 36px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 520px;
        }

        .upload-zone {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 20px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #38bdf8;
            background: #0f2030;
        }

        .upload-zone .icon { font-size: 2.5rem; margin-bottom: 10px; }

        .upload-zone p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .upload-zone strong { color: #38bdf8; }

        #fileInput { display: none; }

        #preview {
            display: none;
            width: 100%;
            max-height: 240px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        button#predictBtn {
            width: 100%;
            padding: 12px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }

        button#predictBtn:hover { background: #0284c7; }
        button#predictBtn:disabled { background: #334155; cursor: not-allowed; }

        #loading {
            display: none;
            text-align: center;
            color: #94a3b8;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #results { display: none; margin-top: 24px; }

        .result-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 12px;
        }

        .top-result {
            background: #0f2030;
            border: 1px solid #0ea5e9;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .top-result .name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .top-result .conf {
            font-size: 1.4rem;
            font-weight: 800;
            color: #38bdf8;
            margin-left: auto;
        }

        .badge {
            background: #0ea5e9;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .top3-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 10px;
        }

        .top3-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .top3-item .rank {
            color: #64748b;
            font-size: 0.8rem;
            width: 18px;
        }

        .top3-item .t3name { flex: 1; font-size: 0.9rem; }

        .top3-item .bar-wrap {
            flex: 1;
            background: #1e293b;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .top3-item .bar {
            height: 100%;
            background: #38bdf8;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .top3-item .t3conf {
            font-size: 0.85rem;
            color: #94a3b8;
            width: 48px;
            text-align: right;
        }

        #error {
            display: none;
            background: #2d1515;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .api-note {
            margin-top: 14px;
            font-size: 0.75rem;
            color: #475569;
            text-align: center;
        }

        .api-note input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            width: 100%;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<h1>Pakistani Politician Classifier</h1>
<p class="subtitle">Upload a face image — CNN identifies the politician</p>

<div class="card">

    <div class="upload-zone" id="uploadZone">
        <div class="icon">[image]</div>
        <p><strong>Click to upload</strong> or drag &amp; drop</p>
        <p>JPEG / PNG images only</p>
    </div>

    <input type="file" id="fileInput" accept="image/jpeg,image/png">
    <img id="preview" alt="Preview">

    <button id="predictBtn">Classify Politician</button>

    <div id="loading">
        <span class="spinner"></span> Analyzing image...
    </div>

    <div id="error"></div>

    <div id="results">
        <p class="result-header">Top Prediction</p>
        <div class="top-result">
            <span class="badge">BEST</span>
            <span class="name" id="topName">—</span>
            <span class="conf" id="topConf">—</span>
        </div>

        <p class="top3-label">Top 3 Predictions</p>
        <div id="top3List"></div>
    </div>

    <div class="api-note">
        API endpoint
        <input type="text" id="apiUrl" value="" placeholder="http://localhost:8000">
    </div>

</div>

<script>
    const uploadZone  = document.getElementById('uploadZone');
    const fileInput   = document.getElementById('fileInput');
    const preview     = document.getElementById('preview');
    const predictBtn  = document.getElementById('predictBtn');
    const loading     = document.getElementById('loading');
    const results     = document.getElementById('results');
    const errorDiv    = document.getElementById('error');
    const topName     = document.getElementById('topName');
    const topConf     = document.getElementById('topConf');
    const top3List    = document.getElementById('top3List');
    const apiUrlInput = document.getElementById('apiUrl');

    // Default the API URL to the page's own origin (so same-host FastAPI just works)
    apiUrlInput.value = window.location.origin;

    let selectedFile = null;

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', e => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));

    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
        if (!['image/jpeg', 'image/png', 'image/jpg'].includes(file.type)) {
            showError('Please upload a JPEG or PNG image.');
            return;
        }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
        predictBtn.style.display = 'block';
        results.style.display = 'none';
        errorDiv.style.display = 'none';
    }

    predictBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        const apiBase = apiUrlInput.value.trim().replace(/\/$/, '');

        predictBtn.disabled = true;
        loading.style.display = 'block';
        results.style.display = 'none';
        errorDiv.style.display = 'none';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const res = await fetch(`${apiBase}/predict`, {
                method: 'POST',
                body: formData
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `Server error ${res.status}`);
            }

            const data = await res.json();
            showResults(data);

        } catch (err) {
            showError(`Request failed: ${err.message}. Check the API URL below.`);
        } finally {
            predictBtn.disabled = false;
            loading.style.display = 'none';
        }
    });

    function showResults(data) {
        topName.textContent = data.predicted_class;
        topConf.textContent = data.confidence.toFixed(1) + '%';

        top3List.innerHTML = '';
        data.top3_predictions.forEach(p => {
            const item = document.createElement('div');
            item.className = 'top3-item';
            item.innerHTML = `
                <span class="rank">#${p.rank}</span>
                <span class="t3name">${p.name}</span>
                <div class="bar-wrap">
                    <div class="bar" style="width:${p.confidence}%"></div>
                </div>
                <span class="t3conf">${p.confidence.toFixed(1)}%</span>`;
            top3List.appendChild(item);
        });

        results.style.display = 'block';
    }

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
    }
</script>
</body>
</html>
